name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm ci
      - run: npm run build
        env:
          VITE_CDN_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          VITE_ALLOWED_PARENT_ORIGINS: https://${{ github.repository_owner }}.github.io
          VITE_ENABLE_HORIZONS_HANDLERS: 'false'
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
